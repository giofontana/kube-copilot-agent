# This rule is not used by the project kube-copilot-agent itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kubecopilot.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-copilot-agent
    app.kubernetes.io/managed-by: kustomize
  name: kubecopilotagent-editor-role
rules:
- apiGroups:
  - kubecopilot.io
  resources:
  - kubecopilotagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubecopilot.io
  resources:
  - kubecopilotagents/status
  verbs:
  - get
