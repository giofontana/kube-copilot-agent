{{- if .Values.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
  labels:
    {{- include "kube-copilot-agent.labels" . | nindent 4 }}
    control-plane: controller-manager
{{- end }}
